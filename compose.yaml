services:
  docker-state-sync:
    container_name: lucky-light-panel-docker-sync
    build:
      context: .
      dockerfile: docker-sync/Dockerfile
    restart: unless-stopped
    environment:
      DOCKER_SYNC_INTERVAL: "5"
      DOCKER_SYNC_OUTPUT: /runtime/backend
    labels:
      lightpanel.hidden: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./runtime/backend:/runtime/backend
    healthcheck:
      test: ["CMD-SHELL", "test -s /runtime/backend/docker.json && test -s /runtime/backend/docker-stats.json"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 6

  lucky-light-panel:
    container_name: lucky-light-panel
    depends_on:
      docker-state-sync:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    restart: unless-stopped
    volumes:
      - ./runtime/backend:/usr/share/nginx/html/backend/runtime:ro
