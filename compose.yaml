services:
  lucky-light-panel:
    container_name: lucky-light-panel
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    restart: unless-stopped
    environment:
      DOCKER_SYNC_INTERVAL: "5"
      DOCKER_SYNC_OUTPUT: /usr/share/nginx/html/backend/runtime
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./runtime/backend:/usr/share/nginx/html/backend/runtime
    healthcheck:
      test: ["CMD-SHELL", "test -s /usr/share/nginx/html/backend/runtime/docker.json && test -s /usr/share/nginx/html/backend/runtime/docker-stats.json && wget -qO- http://127.0.0.1:5173/ >/dev/null"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 6
